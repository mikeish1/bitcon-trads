# =============================================================================
# Binance.US Spot - High-Conviction Long-Only BTC Bot - Configuration
# =============================================================================
# Conservative, safe defaults. A basic user rarely needs to touch this.
# Secrets + the live trading switches live in ENVIRONMENT VARIABLES (.env / Railway).
# Environment variables always override values here.
# =============================================================================

market:
  symbol: "BTC/USDT"          # default single symbol (used only by single-asset tools)
  primary_timeframe: "1d"     # DAILY base timeframe for the trend-follower
  confirm_timeframes: []      # donchian mode uses a single timeframe
  backfill_candles: 400       # daily candles on startup (~1.1y; warms indicators)
  poll_seconds: 900           # check every 15 min (a daily strategy needs no faster)

# --- The trading universe (dynamic; add/remove coins here, no code changes) --
# List the BASE assets you want to trade. The quote currency is chosen per venue
# automatically (USD on Alpaca, USDT on Binance.US). Coins the live venue does
# not list are skipped at startup with a warning - so it's safe to list all of
# them. Override the list at runtime with the SYMBOLS env var (e.g. "BTC,ETH,SOL").
universe:
  # Default = the coins Alpaca (the default paper venue) supports.
  # On Binance.US, add BNB and VET too: [BTC, ETH, BNB, SOL, XRP, DOGE, ADA, VET]
  bases: [BTC, ETH, SOL, XRP, DOGE, ADA]
  overrides: {}              # optional per-asset tuning, e.g. {ETH: {entry_period: 30}}

# --- Portfolio-level risk controls (across ALL coins) -----------------------
portfolio:
  max_concurrent_positions: 3   # never hold more than this many coins at once
  max_total_exposure_pct: 0.90  # cap total $ deployed across all positions (of equity)
  per_asset_alloc_pct: 0.30     # cap any single position at this fraction of equity

# --- Strategy selection -----------------------------------------------------
strategy:
  # "donchian"        = VALIDATED daily breakout trend-follower (recommended).
  # "high_conviction" = the old 5m multi-timeframe system (validated unprofitable;
  #                     kept for reference only - needs 5m/15m/1h timeframes above).
  mode: "donchian"

  # --- Donchian breakout trend-follower (the active strategy) ---
  donchian:
    entry_period: 40          # buy when daily close > highest high of prior 40 days
    atr_period: 14            # ATR window for the trailing exit
    atr_trail_mult: 3.0       # exit when close falls 3 x ATR below highest close held
    min_history: 60           # need this many daily candles before trading

  # --- Market regime filter (validated improvement) ---
  # Only buy a coin while BTC itself is in an uptrend (BTC close > its MA), and
  # exit all positions when BTC drops below it. Alts are ~0.8 correlated to BTC,
  # so this cuts failed-breakout whipsaw in BTC downtrends. Big risk-adjusted win.
  btc_regime:
    enabled: true
    ma_period: 100

  # --- Volatility-targeted sizing (optional; ~neutral in tests, default off) ---
  # When on, coins more volatile than target_daily_vol get a smaller allocation.
  vol_target:
    enabled: false
    target_daily_vol: 0.04

  # --- Allocation mode: HOW capital is deployed across the universe -----------
  # first_come        = current live behavior. Every coin that breaks out is sized
  #                     independently (per_asset_alloc / max_total caps), in order.
  # momentum_rotation = hold only the K STRONGEST coins (by N-day momentum) that
  #                     have an active Donchian trend, rotating every rebalance_days.
  #                     Validated OOS as a higher risk-adjusted allocator (see
  #                     src/momentum_final.py), but it is a real behavioural change
  #                     vs first_come - PAPER-TEST it first. OFF by default.
  # Override fast with the ALLOCATION_MODE env var (e.g. on Railway).
  allocation:
    mode: "first_come"        # "first_come" (default) | "momentum_rotation"
    momentum_rotation:
      top_k: 4                # hold the 4 strongest active coins at once
      rebalance_days: 2       # rotate at most every N days (RISK exits still any day)
      lookback_days: 90       # momentum = close / close N days ago - 1
      keep_band: 1            # hysteresis: keep a held coin until rank > top_k+keep_band

# --- High-conviction long logic (ONLY used when strategy.mode=high_conviction) -
  # LAYER 1 - Hard gates. ALL must pass or the bot stays flat.
  gates:
    htf_ema_period: 200       # 1h close must be above this EMA (established uptrend)
    htf_fast_ema: 50          # ...and above this faster EMA
    adx_period: 14
    adx_min: 25               # 1h ADX must exceed this (real trend, not chop)
    mtf_fast_ema: 50          # 15m close must be above this EMA (alignment)
    structure_lookback: 20    # bars used to confirm higher highs / higher lows

  # LAYER 2 - Entry-trigger ensemble on the 5m candle.
  triggers:
    min_required: 6           # need this many of the triggers below to fire
    rsi_period: 14
    rsi_pullback_low: 40      # RSI pullback zone in an uptrend (NOT deep-oversold)
    rsi_pullback_high: 58
    pullback_ema: 21          # price should be near this rising EMA (a healthy dip)
    pullback_distance_pct: 0.012   # "near" = within 1.2% of that EMA
    volume_factor: 1.3        # signal-candle volume vs its average to "confirm"

  # LAYER 3 - Bearish vetoes. ANY of these cancels an otherwise-valid setup.
  vetoes:
    rsi_overbought: 78        # don't chase: veto if 5m RSI is this hot
    htf_macd_must_be_positive: true   # veto if the 1h MACD histogram is negative

  # LAYER 4 - Optional Claude final yes/no, only on borderline conviction.
  claude_consult_band: 1      # consult when trigger count is within this many of min_required

# --- Risk + position sizing (dynamic) ---------------------------------------
risk:
  default_capital_usd: 250.0  # assumed capital in paper mode / fallback if balance unknown
  risk_per_trade_pct: 0.01    # risk at most 1% of portfolio equity per trade
  max_position_pct: 0.95      # never spend more than 95% of available USDT on one buy
  min_notional_usd: 10.0      # Binance.US minimum order value (skip anything smaller)
  kelly_fraction: 0.25        # conservative fractional-Kelly scaler on the risk %
  kelly_assumed_payoff: 2.0   # reward:risk assumption for the Kelly calc

# --- Exits: ATR trailing stop + exchange-side protective stop ----------------
exits:
  atr_period: 14
  atr_stop_mult: 2.0          # initial stop = entry - 2.0 * ATR ...
  min_stop_pct: 0.01          # ...but never tighter than 1% (avoids noise stop-outs
                              #    on the small 5m ATR). This usually dominates.
  atr_trail_mult: 2.5         # trailing stop = price - 2.5 * ATR (ratchets up only)
  take_profit_R: 3.0          # take-profit at 3x the initial risk (3R)
  stop_limit_offset_pct: 0.003  # stop-LIMIT placed 0.3% below the stop trigger
  use_exchange_stop: true     # also place a stop on the exchange (offline protection)

# --- Safety rails -----------------------------------------------------------
safety:
  daily_loss_limit_pct: 0.03  # stop trading for the day after -3% equity
  weekly_loss_limit_pct: 0.07 # stop trading for the week after -7% equity
  max_consecutive_losses: 4   # circuit breaker
  cooldown_minutes: 60        # wait this long after an exit before buying again
  max_trades_per_day: 4       # hard cap on entries per day
  max_open_positions: 1       # one BTC position at a time

execution:
  taker_fee_pct: 0.001        # Binance.US spot taker fee (~0.10%)
  paper_slippage_pct: 0.0007  # simulated slippage on paper fills

claude:
  model: "claude-haiku-4-5"   # cheap; override with CLAUDE_MODEL env var
  max_tokens: 1024
  daily_summary_hour_utc: 0

logging:
  level: "INFO"
