# =============================================================================
# Binance.US Spot - High-Conviction Long-Only BTC Bot - Configuration
# =============================================================================
# Conservative, safe defaults. A basic user rarely needs to touch this.
# Secrets + the live trading switches live in ENVIRONMENT VARIABLES (.env / Railway).
# Environment variables always override values here.
# =============================================================================

market:
  symbol: "BTC/USDT"          # default single symbol (used only by single-asset tools)
  primary_timeframe: "1d"     # DAILY base timeframe for the trend-follower
  confirm_timeframes: []      # donchian mode uses a single timeframe
  backfill_candles: 400       # daily candles on startup (~1.1y; warms indicators)
  poll_seconds: 900           # check every 15 min (a daily strategy needs no faster)

# --- The trading universe (dynamic; add/remove coins here, no code changes) --
# List the BASE assets you want to trade. The quote currency is chosen per venue
# automatically (USD on Alpaca, USDT on Binance.US). Coins the live venue does
# not list are skipped at startup with a warning - so it's safe to list all of
# them. Override the list at runtime with the SYMBOLS env var (e.g. "BTC,ETH,SOL").
universe:
  # Default = the coins Alpaca (the default paper venue) supports.
  # On Binance.US, add BNB and VET too: [BTC, ETH, BNB, SOL, XRP, DOGE, ADA, VET]
  bases: [BTC, ETH, SOL, XRP, DOGE, ADA]
  overrides: {}              # optional per-asset tuning, e.g. {ETH: {entry_period: 30}}

  # --- Disciplined universe expansion (gated; never auto-applied) -------------
  # New coins are added to `bases` ONLY after they clear strict liquidity +
  # correlation gates AND demonstrate a portfolio-level benefit in a backtest.
  # `candidates` are merely PROPOSED; `approved_expanded_universe` is filled by a
  # human after running `python -m src.universe_expansion_research` and reviewing
  # the report. The live bot still trades `bases`; this section is process, not a
  # runtime switch. See src/universe.py + src/universe_expansion_research.py.
  expansion:
    enabled: false
    candidates: [AVAX, LINK, LTC, DOT]   # liquid majors proposed for evaluation
    validation_lookback: 365             # days of history the gates/backtest use
    # Validated 2026-06 via `python -m src.universe_expansion_research` (4y daily):
    #   LTC  APPROVED - corr 0.85 (<=0.90); diversification PASS (portfolio vol
    #                   -0.8%, turnover +17.6% < 50%). Cleared correlation + benefit.
    #   AVAX rejected - no diversification benefit (vol +1.6%, Calmar -0.02).
    #   LINK rejected - correlation 0.93 with ETH (> 0.90).
    #   DOT  rejected - too illiquid even at a venue-calibrated floor.
    # LTC is staged here but NOT added to `bases`: its Binance.US ADV (~$25k/day) is
    # in line with thin incumbents (ADA/BNB/DOGE) yet below the conservative global
    # liquidity floor. Flip it into `bases` only after calibrating
    # liquidity_filters.min_avg_daily_volume_usdt to the live venue's volume scale.
    approved_expanded_universe: [LTC]    # populated ONLY after gates pass (with evidence)

# --- Liquidity + correlation gates for universe expansion -------------------
# Quantitative bars a candidate coin must clear before it can be approved. Tuned
# for daily spot majors; tighten for a more conservative book.
liquidity_filters:
  # NOTE: the absolute floor is calibrated for LIQUID GLOBAL venues. Binance.US alt
  # volume is far thinner (even BTC reads ~$3.5M/day in its data), so for a
  # Binance.US-only book either lower this floor to the venue's scale or lean on the
  # relative floor below. Run `python -m src.universe_expansion_research` to see the
  # member ADV reference before setting it.
  min_avg_daily_volume_usdt: 30000000.0  # absolute >= $30M/day rolling-average dollar volume
  min_relative_to_median_pct: 0.5        # AND >= 50% of the median existing-member ADV (venue-relative)
  volume_window: 30                      # rolling window (days) for the volume test
  max_pairwise_correlation: 0.90         # reject if daily-return corr with ANY member exceeds this
  correlation_lookback: 180              # window (days) for the correlation test
  min_vol_reduction_pct: 0.0             # require portfolio realized vol not to worsen (>=0)
  min_calmar_improvement: 0.0            # require portfolio Calmar not to worsen (>=0)
  max_turnover_increase_pct: 0.50        # reject if adding the coin raises switch count > 50%

# --- Portfolio-level risk controls (across ALL coins) -----------------------
portfolio:
  max_concurrent_positions: 3   # never hold more than this many coins at once
  max_total_exposure_pct: 0.90  # LEGACY default envelope (of equity); see capital_policy
  per_asset_alloc_pct: 0.30     # cap any single position at this fraction of equity

  # --- Thin sleeve overlay (meta-allocation across the 3 sibling bots) --------
  # A LIGHTWEIGHT overlay that computes target weights across the Donchian, Carry
  # and ETF sleeves from each sleeve's recent equity curve. It is INFORMATIONAL by
  # default (logged once/day, no capital is moved) and never duplicates any bot's
  # risk/execution/data logic - the three bots keep running independently. A future
  # meta-runner can read these weights to notionally re-allocate. See
  # src/portfolio_sleeve_allocator.py and docs/SLEEVE_ALLOCATOR.md.
  sleeves:
    enabled: false                  # true -> log daily target weights in the spot loop
    members: [donchian, carry, etf]
    allocator_mode: "risk_parity"   # "risk_parity" (inverse-vol) | "momentum_of_strategies"
    lookback_days: 60               # window for sleeve return/vol/Sharpe
    min_weight: 0.15                # per-sleeve floor (sum-to-1 after clamping)
    max_weight: 0.60                # per-sleeve ceiling
    rebalance_threshold: 0.10       # only move weights when max drift > this (anti-churn)
    momentum_metric: "sharpe"       # "sharpe" | "return" (momentum_of_strategies mode)
    momentum_tilt: 0.5              # 0 = equal weight .. 1 = full tilt toward winners
    regime_boost_factor: 0.20       # boost the Donchian weight this much when BTC risk-on
    vol_floor: 0.001                # floor on sleeve daily vol (avoids divide-by-zero)

# --- Deployable-capital limit (THE master cap; user-adjustable) -------------
# The single, centralized ceiling on how much capital the system may have
# committed to trades at once. It governs the TOTAL envelope only - it does not
# change how capital is ranked/allocated to the best opportunities within it.
#
#   max_pct    : fraction (0..1] of the `basis` that may be deployed (0.90 = 90%).
#   max_usd    : absolute USD ceiling on deployed capital (omit for "no USD cap").
#   basis      : "equity" (total account value) | "cash" (free quote balance).
#   precedence : when BOTH caps are set, how to combine them -
#                "min" (safest, default) | "max" | "usd" | "pct".
# At least one of max_pct / max_usd must be set. Per-sleeve overrides are allowed
# (capital_policy.spot / .carry / .etf); a flat block applies to the spot sleeve.
#
# Resolution precedence (highest wins): env vars (MAX_DEPLOYED_CAPITAL_*) >
# config/capital_limits.json (written by the settings service / future frontend,
# hot-reloaded without restart) > this block > the legacy values above.
#
# Defaults below reproduce the legacy behavior exactly (90% of equity). To impose
# a hard dollar ceiling, uncomment max_usd (it then binds via `min`). Examples:
#   spot: {max_pct: 0.90, max_usd: 1000, basis: equity, precedence: min}
capital_policy:
  spot:
    max_pct: 0.90             # <= 90% of equity (matches the legacy default)
    # max_usd: 1000.0         # uncomment to also cap deployed capital at $1,000
    basis: "equity"
    precedence: "min"

# --- Strategy selection -----------------------------------------------------
strategy:
  # "donchian"        = VALIDATED daily breakout trend-follower (recommended).
  # "high_conviction" = the old 5m multi-timeframe system (validated unprofitable;
  #                     kept for reference only - needs 5m/15m/1h timeframes above).
  mode: "donchian"

  # --- Donchian breakout trend-follower (the active strategy) ---
  donchian:
    entry_period: 40          # buy when daily close > highest high of prior 40 days
    atr_period: 14            # ATR window for the trailing exit
    atr_trail_mult: 3.0       # exit when close falls 3 x ATR below highest close held
    min_history: 60           # need this many daily candles before trading

  # --- Market regime filter (validated improvement) ---
  # Only buy a coin while BTC itself is in an uptrend (BTC close > its MA), and
  # exit all positions when BTC drops below it. Alts are ~0.8 correlated to BTC,
  # so this cuts failed-breakout whipsaw in BTC downtrends. Big risk-adjusted win.
  btc_regime:
    enabled: true
    ma_period: 100

  # --- Higher-timeframe regime gate (matured btc_regime; see src/regime.py) -----
  # A fuller, configurable risk-on/off gate on a reference asset (default BTC).
  # When `enabled: true` this SUPERSEDES the simple `btc_regime` block above; when
  # false (default) the legacy btc_regime behaviour is used unchanged. Instead of a
  # hard on/off it produces a `size_factor` so risk-off can either block new
  # entries (factor 0.0, the legacy behaviour) or merely shrink them (e.g. 0.2).
  #   method: "ma"        -> close > rolling MA (== legacy btc_regime).
  #           "ma_slope"  -> close > MA AND the MA is rising over slope_lookback.
  #           "vol"       -> realized daily vol must be below vol_ceiling.
  #           "composite" -> weighted risk-on score (ma+slope+vol) vs score_threshold.
  regime:
    enabled: false
    reference: "BTC"             # base asset whose trend defines the regime
    method: "ma"                 # ma | ma_slope | vol | composite
    ma_period: 100               # MA length for the trend test (matches btc_regime)
    slope_lookback: 20           # bars used for the rising-MA test (ma_slope/composite)
    vol_period: 20               # window for realized daily vol (vol/composite)
    vol_ceiling: 0.05            # daily vol above this = risk-off (vol/composite)
    score_threshold: 0.5         # composite risk-on score must exceed this
    weights: {ma: 0.5, slope: 0.25, vol: 0.25}   # composite component weights
    risk_off_size_factor: 0.0    # fraction of normal size allowed in risk-off (0 = none)
    risk_off_exit: true          # also flatten open positions in risk-off (legacy behaviour)
    tighten_trail_mult: null     # optional tighter chandelier mult while risk-off (null = unchanged)

  # --- Volatility-targeted sizing (optional; ~neutral in tests, default off) ---
  # When on, coins more volatile than target_daily_vol get a smaller allocation.
  vol_target:
    enabled: false
    target_daily_vol: 0.04

  # --- Staged profit-taking / ratcheting exits (default off; see src/strategy.py) -
  # Builds ON TOP of the ATR chandelier trail. As a winner extends (measured in
  # multiples of the ATR captured AT ENTRY), scale out tranches, ratchet the stop
  # to breakeven+buffer, and tighten the trailing multiple on the residual runner.
  # All exits remain long-only and ratchet favourably only (the stop never loosens).
  # Disabled by default so live behaviour is identical until you opt in.
  profit_taking:
    enabled: false
    tiers:                       # each tier fires at most once, in ascending order
      - {profit_atr: 1.5, scale_pct: 0.33}   # at +1.5*ATR sell 33% of the ORIGINAL size
      - {profit_atr: 3.0, scale_pct: 0.33}   # at +3.0*ATR sell another 33%
    breakeven_after_tier: 1      # after this many tiers fire, lift stop to BE+buffer
    breakeven_buffer_atr: 0.5    # breakeven floor = entry + 0.5*ATR_at_entry
    ratchet_trail_mults: [3.0, 2.5, 2.0]   # chandelier mult by #tiers filled (tightens)
    time_stop_days: 0            # >0: exit the runner after N days with no new peak (0 = off)

  # --- Allocation mode: HOW capital is deployed across the universe -----------
  # first_come        = current live behavior. Every coin that breaks out is sized
  #                     independently (per_asset_alloc / max_total caps), in order.
  # momentum_rotation = hold only the K STRONGEST coins (by N-day momentum) that
  #                     have an active Donchian trend, rotating every rebalance_days.
  #                     Validated OOS as a higher risk-adjusted allocator (see
  #                     src/momentum_final.py), but it is a real behavioural change
  #                     vs first_come - PAPER-TEST it first. OFF by default.
  # Override fast with the ALLOCATION_MODE env var (e.g. on Railway).
  allocation:
    mode: "first_come"        # "first_come" (default) | "momentum_rotation"
    momentum_rotation:
      top_k: 4                # hold the 4 strongest active coins at once
      rebalance_days: 2       # rotate at most every N days (RISK exits still any day)
      lookback_days: 90       # momentum = close / close N days ago - 1
      keep_band: 1            # hysteresis: keep a held coin until rank > top_k+keep_band
      # --- Ranking signal: "simple" = the validated N-day ROC (default). ---------
      # "composite" ranks by a normalized weighted blend of breakout strength,
      # short + long ROC, relative strength vs BTC, and an inverse-vol/liquidity
      # term - concentrating capital on the highest-quality breakouts. Components
      # are normalized cross-sectionally (z-score) across the candidate set each
      # rebalance, so weights are comparable. Default "simple" preserves the OOS-
      # validated behaviour; flip to "composite" only after paper-testing.
      scoring: "simple"       # "simple" | "composite"
      min_momentum_threshold: null   # exclude assets whose long ROC is below this (null = off)
      composite:
        weights: {breakout: 0.30, roc_long: 0.30, roc_short: 0.15, rel_btc: 0.15, inv_vol: 0.10}
        roc_short_days: 20    # shorter ROC horizon for the composite
        entry_period: 40      # Donchian window for breakout-strength (defaults to donchian.entry_period)
        normalize: "zscore"   # "zscore" | "rank" (cross-sectional normalization)

# --- High-conviction long logic (ONLY used when strategy.mode=high_conviction) -
  # LAYER 1 - Hard gates. ALL must pass or the bot stays flat.
  gates:
    htf_ema_period: 200       # 1h close must be above this EMA (established uptrend)
    htf_fast_ema: 50          # ...and above this faster EMA
    adx_period: 14
    adx_min: 25               # 1h ADX must exceed this (real trend, not chop)
    mtf_fast_ema: 50          # 15m close must be above this EMA (alignment)
    structure_lookback: 20    # bars used to confirm higher highs / higher lows

  # LAYER 2 - Entry-trigger ensemble on the 5m candle.
  triggers:
    min_required: 6           # need this many of the triggers below to fire
    rsi_period: 14
    rsi_pullback_low: 40      # RSI pullback zone in an uptrend (NOT deep-oversold)
    rsi_pullback_high: 58
    pullback_ema: 21          # price should be near this rising EMA (a healthy dip)
    pullback_distance_pct: 0.012   # "near" = within 1.2% of that EMA
    volume_factor: 1.3        # signal-candle volume vs its average to "confirm"

  # LAYER 3 - Bearish vetoes. ANY of these cancels an otherwise-valid setup.
  vetoes:
    rsi_overbought: 78        # don't chase: veto if 5m RSI is this hot
    htf_macd_must_be_positive: true   # veto if the 1h MACD histogram is negative

  # LAYER 4 - Optional Claude final yes/no, only on borderline conviction.
  claude_consult_band: 1      # consult when trigger count is within this many of min_required

# --- Risk + position sizing (dynamic) ---------------------------------------
risk:
  default_capital_usd: 250.0  # assumed capital in paper mode / fallback if balance unknown
  risk_per_trade_pct: 0.01    # risk at most 1% of portfolio equity per trade
  max_position_pct: 0.95      # never spend more than 95% of available USDT on one buy
  min_notional_usd: 10.0      # Binance.US minimum order value (skip anything smaller)
  kelly_fraction: 0.25        # conservative fractional-Kelly scaler on the risk %
  kelly_assumed_payoff: 2.0   # reward:risk assumption for the Kelly calc

  # --- Explicit per-trade risk budgeting + global vol targeting (default off) ---
  # When `enabled`, a new trend position is sized so that being stopped out at the
  # initial ATR stop loses about `risk_per_trade_pct` of equity:
  #     stop_distance_pct = atr_pct * atr_stop_mult            (entry -> initial stop)
  #     risk_notional     = equity * risk_per_trade_pct / stop_distance_pct
  # The position is then min(per_asset_cap, risk_notional, ...hard caps). On top of
  # that, an optional GLOBAL vol-target scalar nudges total exposure toward a target
  # daily portfolio vol (clamped to [scalar_min, scalar_max]); it can shrink size in
  # turbulent tape and grow it (only up to the existing hard caps) in calm trends.
  # All hard caps (capital_policy envelope, per_asset_alloc, available cash) STILL
  # bind, so enabling this never raises risk beyond what those caps already permit.
  risk_budget:
    enabled: false
    risk_per_trade_pct: 0.0075   # per-trade equity-at-risk used for ATR-stop sizing
    atr_stop_mult: 2.0           # entry->initial-stop distance in ATRs (matches exits.atr_stop_mult)
    target_portfolio_vol: 0.025  # desired daily portfolio vol for the global scalar (0 = off)
    vol_scalar_min: 0.5          # clamp on the global exposure scalar (floor)
    vol_scalar_max: 2.0          # clamp on the global exposure scalar (ceiling)
    # How the GLOBAL vol-target scalar measures current portfolio vol:
    #   "proxy"    -> mean ATR% across held coins (no state; reacts instantly).
    #   "realized" -> stdev of daily portfolio-equity returns over vol_lookback_days
    #                 (true realized vol from the equity curve; falls back to the
    #                 proxy until enough daily equity snapshots exist).
    vol_source: "proxy"          # "proxy" | "realized"
    vol_lookback_days: 20        # window for realized portfolio vol

# --- Exits: ATR trailing stop + exchange-side protective stop ----------------
exits:
  atr_period: 14
  atr_stop_mult: 2.0          # initial stop = entry - 2.0 * ATR ...
  min_stop_pct: 0.01          # ...but never tighter than 1% (avoids noise stop-outs
                              #    on the small 5m ATR). This usually dominates.
  atr_trail_mult: 2.5         # trailing stop = price - 2.5 * ATR (ratchets up only)
  take_profit_R: 3.0          # take-profit at 3x the initial risk (3R)
  stop_limit_offset_pct: 0.003  # stop-LIMIT placed 0.3% below the stop trigger
  use_exchange_stop: true     # also place a stop on the exchange (offline protection)

# --- Safety rails -----------------------------------------------------------
safety:
  daily_loss_limit_pct: 0.03  # stop trading for the day after -3% equity
  weekly_loss_limit_pct: 0.07 # stop trading for the week after -7% equity
  max_consecutive_losses: 4   # circuit breaker
  cooldown_minutes: 60        # wait this long after an exit before buying again
  max_trades_per_day: 4       # hard cap on entries per day
  max_open_positions: 1       # one BTC position at a time

execution:
  taker_fee_pct: 0.001        # Binance.US spot taker fee (~0.10%)
  maker_fee_pct: 0.001        # maker fee (~0.10%); used by post-only fills + cost model
  paper_slippage_pct: 0.0007  # simulated MARKET-order slippage on paper fills

  # --- Limit orders on entry (reduce taker slippage; market fallback) ----------
  # A breakout entry is placed as a LIMIT order near the signal price; if it does
  # not fill within the timeout it is cancelled and re-sent as a MARKET order so a
  # genuine breakout is never missed. Exits keep their existing market/stop logic.
  # In paper/sim the limit is modelled as filling at the limit price (capturing the
  # offset as price improvement vs the market-slippage path) - optimistic on fills;
  # use the backtester's slippage knob for the pessimistic miss case.
  use_limit_orders_on_entry: true
  entry_limit_offset_bps: 0       # limit = price*(1 + offset/1e4); <0 = passive/maker-seeking
  limit_order_timeout_sec: 60     # cancel + market-fallback after this long unfilled (live)
  limit_poll_interval_sec: 3      # how often to poll the resting limit (live)
  post_only: false                # exchange post-only (maker-only) where supported
  # Paper/sim fill realism (live fills are always real):
  #   optimistic - the limit fills in full at the limit price (best case; default).
  #   realistic  - only `paper_limit_fill_ratio` fills at the limit; the remainder
  #                falls back to market (or is abandoned by the chase guard), so
  #                paper reflects that passive limits don't always fully fill.
  paper_limit_fill_model: "optimistic"   # optimistic | realistic
  paper_limit_fill_ratio: 0.7            # realistic: fraction filled at the limit
  # Don't-chase guard (sim + live): if the market FALLBACK would execute more than
  # this far above the intended/signal price, ABANDON the entry instead of chasing a
  # breakout that already ran away (models the real opportunity-miss cost). 0 = off.
  max_entry_chase_bps: 0

  # --- Slippage instrumentation (intended vs actual fill; bps + USD) -----------
  # Every fill is recorded to the `fills` table; query with `python -m src.slippage`.
  slippage_logging_enabled: true
  max_slippage_tolerance_bps: 50  # warn (and flag) when adverse slippage exceeds this

  # --- Cost-aware pair preference (low-turnover Donchian is spread/fee sensitive) -
  #   off    - no effect (default; fully backward-compatible).
  #   soft   - cheaper coins are favoured as a tie-breaker (ordering / score penalty).
  #   strict - coins whose effective round-trip cost exceeds max_effective_cost_bps
  #            are dropped from the tradable universe each cycle.
  # Effective cost = 2 x taker fee + spread_factor x a daily-range spread proxy.
  cost_preference_mode: "off"     # off | soft | strict
  max_effective_cost_bps: 60      # strict-mode ceiling on round-trip effective cost
  cost_penalty_weight: 1.0        # soft-mode penalty scaler on the cost tilt
  spread_proxy_window: 20         # days for the (high-low)/close spread proxy
  spread_proxy_factor: 0.1        # maps daily range -> an intraday spread estimate
  # When true, score cost from REAL data: venue maker/taker tiers + live bid/ask
  # spreads (absolute bps). Falls back to the daily-range proxy per-symbol when a
  # quote is unavailable (offline / backtest). Adds one ticker fetch per coin/cycle.
  cost_use_live_quotes: false
  fee_overrides: {}               # optional per-base taker/maker override, e.g. {BTC: {taker: 0.0008}}

claude:
  model: "claude-haiku-4-5"   # cheap; override with CLAUDE_MODEL env var
  max_tokens: 1024
  daily_summary_hour_utc: 0

# --- Trading-ops agent (live-vs-backtest feedback loop; human-gated) ----------
# A daily/weekly agent that compares LIVE performance to a walk-forward BACKTEST,
# flags statistically significant degradation, and proposes a FEW narrow parameter
# changes. It NEVER applies anything itself - proposals land in ops/proposals/ as
# `pending` and a human approves + applies them via the CLI (see docs/OPS_AGENT.md).
# Read-only by default; enabling only turns on the analysis + proposal WRITING.
ops_agent:
  enabled: false
  comparison:
    live_lookback_days: 60        # live window compared against the backtest
    backtest_window_months: 24    # walk-forward reference window
    min_live_days: 20             # below this -> report only, never propose
  thresholds:
    pvalue: 0.05                  # MWU / Welch significance for return-distribution flags
    dd_z: 2.0                     # sigma below the backtest distribution to flag a window metric
    slippage_alert_bps: 25        # flag when avg live slippage exceeds this
  research:
    min_improvement_pct: 0.15     # promote a sweep winner only if OOS MAR beats live by >= 15%
    entry_grid: [30, 40, 55]      # entry_period values swept on recent data
    atr_grid: [2.5, 3.0, 3.5]     # atr_trail_mult values swept on recent data
  # Persist the (expensive) walk-forward baseline + research sweeps as fingerprinted
  # JSON artifacts: subsequent runs LOAD the cached baseline (reproducible + fast +
  # auditable) instead of recomputing, until the inputs/data change or the TTL lapses.
  artifacts:
    enabled: true
    dir: "ops/artifacts"
    ttl_hours: 24
  proposals:
    approval_mode: "manual"       # manual (human gate) | off (analyze only, never propose)
    max_per_run: 3                # cap on proposals per run (err on fewer)
    proposals_dir: "ops/proposals"
    audit_log: "ops/audit.log"
    # ALLOWLIST: the ONLY keys the agent may propose, each with bounds + type. Safety
    # rails, capital policy and portfolio caps are deliberately ABSENT (and blocked).
    tunable_keys:
      strategy.donchian.entry_period:        {min: 20, max: 80, type: int}
      strategy.donchian.atr_trail_mult:      {min: 2.0, max: 4.5}
      exits.atr_trail_mult:                  {min: 2.0, max: 3.5}
      risk.risk_per_trade_pct:               {min: 0.003, max: 0.02}
      risk.risk_budget.risk_per_trade_pct:   {min: 0.003, max: 0.02}
      strategy.vol_target.target_daily_vol:  {min: 0.02, max: 0.06}
    # Hard blocklist (never proposable, even if mistakenly allowlisted):
    blocked_keys: [safety, capital_policy, portfolio.max_total_exposure_pct,
                   portfolio.per_asset_alloc_pct, portfolio.max_concurrent_positions,
                   risk.max_position_pct, runtime]

logging:
  level: "INFO"

# --- Funding-rate carry (delta-neutral; SIBLING strategy, OFF by default) -----
# Long spot + short perp on the SAME coin to harvest funding. Delta-neutral: P&L
# is funding income minus fees/basis, NOT price direction. USA-legal via
# CFTC-regulated perps (e.g. Kraken Futures / Bitnomial). Runs in its OWN process
# (`python -m src.carry.main`); it never touches the Donchian spot bot. Paper-first:
# `execution.mode: sim` simulates fills against LIVE funding/prices and sends no
# orders. Real orders need CARRY_ENABLED=true AND the two-key tripwire. See
# docs/CARRY_ARBITRAGE.md. Flip fast via env vars (CARRY_*).
carry:
  enabled: false
  assets: [BTC, ETH, SOL]          # must be listed on BOTH the spot and perp venue
  venues:
    spot: "kraken"                 # ccxt id for the long spot leg
    perp: "krakenfutures"          # ccxt id for the short perpetual leg
  poll_seconds: 900                # 8h funding cycle -> 15-min polling is plenty
  funding_interval_hours: 8        # venue funding interval (used to annualise)
  signal:
    min_entry_apr: 0.08            # OPEN only if NET annualised carry >= 8%
    min_hold_apr: 0.02             # comfortable hold zone: funding >= this resets the unwind counter
    unwind_apr: -0.01              # tolerance band: only funding BELOW this (can be slightly
                                   #   negative) counts toward an unwind - avoids churn when
                                   #   funding chops around zero (a round trip costs ~0.4%)
    flip_confirm_reads: 3          # need this many consecutive sub-band polls before unwinding
    funding_lookback: 9            # smooth funding over last N history reads (~3d @8h)
    max_basis_bps: 75              # skip entry if |perp-spot| basis wider than this
    expected_hold_days: 30         # amortise round-trip fees over this horizon
  capital:
    sleeve_usd: 1000.0             # TOTAL capital across both venues (paper sleeve)
    per_asset_cap_usd: 400.0       # max spot notional per asset
    min_notional_usd: 25.0
  risk:
    target_leverage: 1.0           # perp notional / futures collateral (low = safe)
    max_leverage: 2.0
    margin_alert_ratio: 0.40       # warn/de-risk if futures margin ratio below this
    delta_tolerance_pct: 0.03      # flag if spot vs perp qty drift > 3% (partial fills)
    daily_loss_limit_usd: 50.0     # circuit breaker (basis blowups / funding flips)
    max_feed_staleness_seconds: 120
  execution:
    mode: "sim"                    # "sim" (paper, live data) | "live" (needs tripwire)
    taker_fee_pct: 0.0005          # per-leg taker fee assumption
    paper_slippage_pct: 0.0005     # simulated slippage per leg in sim mode

# --- ETF cross-sectional momentum (US equities/ETFs; SIBLING strategy, OFF) ----
# REUSES the same validated engine as the crypto bot - Donchian breakout trend
# filter (src/strategy.py) + top-K momentum rotation (src/momentum_allocator.py) -
# applied to a US ETF universe via Alpaca. Long-only, low-frequency (rebalances
# every N days) so it fits the synchronous loop. USA-legal, commission-free. Runs
# in its OWN process (`python -m src.etf.main`), SIM by default. Flip fast with
# ETF_* env vars. See docs/ETF_MOMENTUM.md.
etf:
  enabled: false
  venue: "alpaca"                  # "alpaca" (alpaca-py: real US equities) | a ccxt id
  alpaca_feed: "iex"               # Alpaca data feed: "iex" (free) | "sip" (paid)
  alpaca_adjustment: "all"         # split+dividend adjust bars (REQUIRED; "raw" reintroduces
                                   # phantom split/ex-div gaps). Env: ETF_ALPACA_ADJUSTMENT.
  primary_timeframe: "1d"
  backfill_days: 400               # daily bars on startup (~1.6y; warms indicators)
  poll_seconds: 3600               # daily strategy; hourly poll is ample
  # Decide signals on the last CONFIRMED-CLOSED daily bar (recommended). During the
  # session the latest bar is still forming; selecting on it diverges from the close-
  # based backtest. Marking/sizing keep the live price. Env: ETF_SIGNAL_ON_CLOSED_CANDLE.
  signal_on_closed_candle: true
  # Diversified, liquid ETFs across asset classes (equities/intl/bonds/gold/cmdty/RE).
  universe: [SPY, QQQ, IWM, EFA, EEM, TLT, IEF, GLD, DBC, VNQ]
  selection:
    # Selector: "rotation" (Donchian-gated top-K, the original) | "dual_momentum"
    # (Antonacci GEM-style abs+rel momentum + defensive sleeve - the design selected
    # for a small TAXABLE account; see docs/equities_replatform/). Env: ETF_SELECTION_MODE.
    mode: "rotation"
    entry_period: 40               # Donchian breakout window (the trend filter)
    atr_trail_mult: 3.0            # chandelier used by active_state (same as crypto)
    min_history: 60                # need this many daily bars before trading
    top_k: 5                       # hold the K strongest eligible ETFs
    rebalance_days: 5              # rotate at most weekly
    lookback_days: 90              # momentum = close / close N days ago - 1
    keep_band: 1                   # rank hysteresis (keep until rank > top_k+band)

  # --- Dual-momentum (only used when selection.mode == dual_momentum) ----------
  # Hold the strongest OFFENSIVE asset(s) only while their absolute momentum beats a
  # T-bill hurdle; otherwise rotate to the strongest DEFENSIVE asset (bonds/gold/
  # T-bills cash floor). Few-parameter, low-turnover (tax-friendly). In this mode the
  # tradable universe is the union of the offensive + defensive sleeves.
  dual_momentum:
    offensive:  [SPY, EFA, EEM]        # US / developed-intl / EM equity
    defensive:  [TLT, IEF, GLD, BIL]   # Treasuries / gold / T-bills (cash floor)
    abs_benchmark: "BIL"               # symbol whose momentum is the absolute hurdle ("" -> 0.0)
    lookback_days: 252                 # ~12-month momentum (absolute + relative share it)
    top_k: 1                           # GEM classic = hold the single strongest
    rebalance_days: 20                 # ~monthly cadence
    keep_band: 0                       # rank hysteresis
    min_history: 260                   # need >= lookback + buffer bars before trading

  # Pattern-Day-Trader guard: never round-trip a symbol the same day it opened (the
  # design holds multi-day/weekly, so this only blocks accidental same-day exits).
  # Keeps a <$25k margin account clear of the 3-day-trades/5-day rule.
  pdt_guard: true

  capital:
    sleeve_usd: 2000.0             # paper sleeve (siloed from crypto equity)
    max_total_exposure_pct: 0.95   # cap total deployed across all ETFs
    min_notional_usd: 10.0
  execution:
    mode: "sim"                    # "sim" (paper ledger, live prices) | "live" (tripwire)
    taker_fee_pct: 0.0             # Alpaca equities are commission-free
    paper_slippage_pct: 0.0005
